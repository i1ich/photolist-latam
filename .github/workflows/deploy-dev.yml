name: Deploy Dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Build functions
        run: |
          ./mvnw -f functions/analyze-photo/pom.xml package -q
          ./mvnw -f functions/generate-upload-url/pom.xml package -q

      - name: Build infrastructure
        run: ./mvnw -f infrastructure/pom.xml package -q

      - name: Deploy CDK
        run: cd infrastructure && npx --yes aws-cdk@2 deploy --all --require-approval never
